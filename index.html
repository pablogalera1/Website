<body class="bg-surface text-on-surface font-body overflow-hidden">
  <!-- Grain -->
  <div class="fixed inset-0 grain-overlay z-[60]"></div>

  <!-- Content -->
  <div class="w-full h-screen flex flex-col items-center justify-center text-center px-6">
    
    <h1 class="font-headline text-6xl italic text-primary mb-4 animate-[fadeIn_1.2s_ease]">
      Chloe <span class="text-secondary">Caviar</span>
    </h1>

    <p class="text-on-surface-variant font-label tracking-[0.25em] uppercase animate-[fadeIn_2s_ease]">
      Entering the experience...
    </p>

    <!-- Small shimmering bar -->
    <div class="w-40 h-[2px] bg-primary/40 mt-8 rounded-full overflow-hidden relative">
      <div class="absolute inset-0 bg-primary animate-[slide_1.4s_linear_infinite]"></div>
    </div>

    <style>
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
    </style>

  </div>
